  <h1 クラス="タグライン">無料のオンラインテレプロンプター-サインアップなし、スクリプトはこのデバイスを離れることはありません</h1>
  <ラベル クラス="srのみ" のために="スクリプト">あなたの台本</label>
  <テキスト領域 id="スクリプト" スペルチェック="虚偽" placeholder="Paste or type your script here…"></textarea>
  <p クラス="ヒント">ヒント: <kbd>Ctrl</kbd>+<kbd>エンター</kbd> 始めるのです プロンプト表示中:tap=pause/resume・ <kbd>宇宙</kbd> 遊び/一時停止・ <kbd>↑</kbd><kbd>↓</kbd> ・速度 <kbd>+</kbd><kbd>−</kbd> フォントサイズ・ <kbd>M</kbd> ミラー・ <kbd>G</kbd> ガイド・ <kbd>F</kbd> フルスクリーン・ <kbd>R</kbd> 再起動・ <kbd>エスク</kbd> 出口</p>

  <セクション クラス="内容">
    <h2>仕組み</h2>
    <オル>
      <リー>上のボックスにスクリプトを貼り付けます。</li>
      <リー>プレス <強い>プロンプト開始</strong>.短いカウントダウン後、テキストは自動的にスクロールします。</li>
      <リー>画面をタップして一時停止または再開します。 読みながら、下のバーから速度とフォントサイズを調整します。</li>
    </オル>

    <h2>特徴</h2>
    <ul>
      <リー><強い>設計上プライベート</強い> -すべてがブラウザで実行されます。 スクリプトはこのデバイスにのみ保存されます。</li>
      <リー><強い>ミラーモード</強い> ビームスプリッターテレプロンプターリグ用です</li>
      <リー><強い>スムーズスクロール</強い> ライブスピードとフォントサイズのコントロール、リーディングガイド、プログレスバーを備えています。</li>
      <リー><強い>どこでも作品</強い> -電話、タブレット(iPadで素晴らしい)、デスクトップ。 プロンプト表示中は画面をスリープ状態に保ちます。</li>
      <リー><強い>無料、口座なし</強い> -アップロードも透かしも時間制限もない</li>
    </ul>

    <h2>ファック</h2>
    <詳細>
      <要約>私のスクリプトはどこかにアップロードされていますか?</summary>
      <p>いいえ。QuickPromptはテキストでネットワークリクエストを行いません。 スクリプトは、このデバイスのブラウザのローカルストレージにのみ保存されます。 ブラウザデータをクリアすると削除されるため、元のコピーは別の場所に保管してください。</p>
    </詳細>
    <詳細>
      <要約>ミラーモードとは何ですか?</要約>
      <p>テキストを水平に反転させる(⇋ボタン、または押す)。 <kbd>M</kbd>)なので、物理的なテレプロンプターリグのビームスプリッターガラスを通して正しく読み取ります。</p>
    </詳細>
    <詳細>
      <要約>iPadとiPhoneで動作しますか?</summary>
      <p>はい-iPad、iPhone、AndroidでSafariとChromeで実行されます。 サポートされているデバイスでは、プロンプト表示中は画面が自動的に停止します。</p>
    </詳細>
    <詳細>
      <要約>キーボードやプレゼンターのリモコンを使ってもいいですか?</summary>
      <p>はい。 <kbd>宇宙</kbd> 再生/一時停止と矢印キーが速度と位置を調整します。 ほとんどのBluetoothプレゼンターリモコンは、スクリプトを前後にジャンプするページアップ/ページダウンを送信します。</p>
    </詳細>
  </セクション>
